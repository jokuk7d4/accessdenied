server {
  listen 443 ssl;
  server_name _;

  ssl_certificate /etc/nginx/certs/app.crt;
  ssl_certificate_key /etc/nginx/certs/app.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  client_max_body_size 25m;

  location / {
    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    # Use $http_host (preserves :port) instead of $host (strips port).
    # Clerk SDK reads Host / X-Forwarded-Host to build redirect URLs;
    # without the port, the handshake lands on https://IP/ (port 443)
    # instead of https://IP:3000/ where the app actually lives.
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
